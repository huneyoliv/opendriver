name: Deploy Automático via Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair versão do build.gradle.kts
        id: get_version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "Versão configurada no Gradle: $VERSION_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Validar Tag contra Versão do Gradle
        run: |
          TAG_NAME="${{ github.ref_name }}"
          CLEAN_TAG="${TAG_NAME#v}"
          
          if [ "$CLEAN_TAG" != "$VERSION_NAME" ]; then
            echo "::error::Divergência detectada! A tag Git ($TAG_NAME) não corresponde ao versionName ($VERSION_NAME) em app/build.gradle.kts!"
            exit 1
          fi
          echo "Validação concluída com sucesso! Tag e Versão no código coincidem ($CLEAN_TAG)."

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compilar APKs (Debug & Release)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Renomear APKs para a Release
        run: |
          mkdir -p build/outputs/artifacts
          cp app/build/outputs/apk/debug/app-debug.apk build/outputs/artifacts/opendriver-v${{ env.VERSION_NAME }}-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk build/outputs/artifacts/opendriver-v${{ env.VERSION_NAME }}-release-unsigned.apk

      - name: Criar GitHub Release e Upload dos APKs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/outputs/artifacts/opendriver-v${{ env.VERSION_NAME }}-debug.apk
            build/outputs/artifacts/opendriver-v${{ env.VERSION_NAME }}-release-unsigned.apk
          name: Release v${{ env.VERSION_NAME }}
          body: |
            Nova versão do OpenDriver disponível para instalação!
            
            ### Arquivos disponíveis:
            * **opendriver-v${{ env.VERSION_NAME }}-debug.apk**: APK de desenvolvimento (assinado com chave de debug padrão, pronto para testes).
            * **opendriver-v${{ env.VERSION_NAME }}-release-unsigned.apk**: APK de produção (não assinado).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
